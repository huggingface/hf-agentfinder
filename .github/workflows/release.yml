name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Build and smoke-test release artifacts
        run: ./scripts/check-release.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: hf-agentfinder-dist
          path: dist/*
          if-no-files-found: error

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        run: uv publish --trusted-publishing automatic dist/*

      - name: Restart Hugging Face Space
        if: startsWith(github.ref, 'refs/tags/')
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "${HF_TOKEN}" ]; then
            echo "HF_TOKEN secret is not configured; skipping Space restart."
            exit 0
          fi
          uv run python - <<'PY'
          from huggingface_hub import HfApi

          HfApi().restart_space("evalstate/hf-agentfinder")
          PY

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
